name: "RobotX Deploy"
description: "Deploy an app to RobotX by downloading a released robotx binary and invoking the CLI"
author: "haibingtown"

inputs:
  base-url:
    description: "RobotX API base URL"
    required: true
  base_url:
    description: "RobotX API base URL (alias of base-url)"
    required: false
    default: ""
  api-key:
    description: "RobotX API key"
    required: true
  api_key:
    description: "RobotX API key (alias of api-key)"
    required: false
    default: ""
  project-path:
    description: "Project path to deploy"
    required: false
    default: "."
  project-name:
    description: "Project name for new projects"
    required: false
    default: ""
  version-label:
    description: "Optional build version label (must match server version_label format)"
    required: false
    default: ""
  version_label:
    description: "Optional build version label (alias of version-label)"
    required: false
    default: ""
  source-ref:
    description: "Optional source reference (e.g. tag:v1.2.3, branch:main@<sha>)"
    required: false
    default: ""
  source_ref:
    description: "Optional source reference (alias of source-ref)"
    required: false
    default: ""
  publish:
    description: "Publish after successful build"
    required: false
    default: "true"
  local-build:
    description: "Build locally and upload artifacts. Must remain true; RobotX cloud build is no longer supported."
    required: false
    default: "true"
  wait:
    description: "Wait for build completion"
    required: false
    default: "true"
  timeout:
    description: "Build timeout (seconds)"
    required: false
    default: "600"
  access:
    description: "Access policy after deploy: unchanged, open, login, or private"
    required: false
    default: "unchanged"
  verify-url:
    description: "Check whether the production URL is anonymously reachable"
    required: false
    default: "false"
  version:
    description: "CLI install mode: release tag (e.g. v1.2.3), latest, or source"
    required: false
    default: "latest"
  install-dir:
    description: "Install directory for robotx binary"
    required: false
    default: ""
  repo:
    description: "Repository owner/name hosting release artifacts"
    required: false
    default: "haibingtown/robotx_cli"
  download-base-url:
    description: "Optional release asset mirror base URL, ending before the release tag"
    required: false
    default: ""
  github-proxy:
    description: "Optional GitHub URL proxy prefix for release asset downloads"
    required: false
    default: ""
  github-api-base:
    description: "Optional GitHub API base URL for resolving latest releases"
    required: false
    default: ""
  extra-args:
    description: "Additional CLI args appended after built-in flags"
    required: false
    default: ""

outputs:
  project_id:
    description: "Project ID from deploy result"
    value: ${{ steps.deploy.outputs.project_id }}
  build_id:
    description: "Build ID from deploy result"
    value: ${{ steps.deploy.outputs.build_id }}
  preview_url:
    description: "Preview URL from deploy result"
    value: ${{ steps.deploy.outputs.preview_url }}
  production_url:
    description: "Production URL from deploy result"
    value: ${{ steps.deploy.outputs.production_url }}
  status:
    description: "Build status from deploy result"
    value: ${{ steps.deploy.outputs.status }}
  version_label:
    description: "Build version label from deploy result"
    value: ${{ steps.deploy.outputs.version_label }}
  version_seq:
    description: "Build version sequence from deploy result"
    value: ${{ steps.deploy.outputs.version_seq }}
  source_ref:
    description: "Build source reference from deploy result"
    value: ${{ steps.deploy.outputs.source_ref }}
  raw_json:
    description: "Raw JSON output from robotx deploy"
    value: ${{ steps.deploy.outputs.raw_json }}

runs:
  using: "composite"
  steps:
    - name: Install robotx CLI
      shell: bash
      run: |
        set -euo pipefail

        INSTALL_DIR="${{ inputs.install-dir }}"
        if [[ -z "${INSTALL_DIR}" ]]; then
          INSTALL_DIR="${RUNNER_TEMP}/robotx-bin"
        fi

        REQUESTED_VERSION="${{ inputs.version }}"
        ACTION_REF="${{ github.action_ref }}"
        export PATH="${INSTALL_DIR}:${PATH}"

        install_release() {
          ROBOTX_VERSION="$1" \
          ROBOTX_INSTALL_DIR="${INSTALL_DIR}" \
          ROBOTX_REPO="${{ inputs.repo }}" \
          ROBOTX_DOWNLOAD_BASE_URL="${{ inputs.download-base-url }}" \
          ROBOTX_GITHUB_PROXY="${{ inputs.github-proxy }}" \
          ROBOTX_GITHUB_API_BASE="${{ inputs.github-api-base }}" \
          ROBOTX_AUTO_PATH="0" \
            bash "${GITHUB_ACTION_PATH}/scripts/install.sh"
        }

        install_source() {
          if ! command -v go >/dev/null 2>&1; then
            echo "go is required for source install" >&2
            return 1
          fi

          echo "Building robotx from source (${ACTION_REF:-local})..."
          (
            cd "${GITHUB_ACTION_PATH}" && \
            go build -o "${INSTALL_DIR}/robotx" ./cmd/robotx
          )
        }

        if [[ "${REQUESTED_VERSION}" == "source" ]]; then
          install_source
        elif [[ "${REQUESTED_VERSION}" == "latest" && ( "${ACTION_REF}" == "main" || "${ACTION_REF}" == "refs/heads/main" ) ]]; then
          if ! install_source; then
            echo "Source build failed; falling back to latest release binary." >&2
            install_release "latest"
          fi
        else
          install_release "${REQUESTED_VERSION}"
        fi

        echo "ROBOTX_INSTALL_DIR=${INSTALL_DIR}" >> "${GITHUB_ENV}"
        echo "${INSTALL_DIR}" >> "${GITHUB_PATH}"

    - name: Deploy
      id: deploy
      shell: bash
      env:
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_BASE_URL_ALT: ${{ inputs.base_url }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_API_KEY_ALT: ${{ inputs.api_key }}
        INPUT_PROJECT_PATH: ${{ inputs.project-path }}
        INPUT_PROJECT_NAME: ${{ inputs.project-name }}
        INPUT_VERSION_LABEL: ${{ inputs.version-label }}
        INPUT_VERSION_LABEL_ALT: ${{ inputs.version_label }}
        INPUT_SOURCE_REF: ${{ inputs.source-ref }}
        INPUT_SOURCE_REF_ALT: ${{ inputs.source_ref }}
        INPUT_PUBLISH: ${{ inputs.publish }}
        INPUT_LOCAL_BUILD: ${{ inputs.local-build }}
        INPUT_WAIT: ${{ inputs.wait }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_ACCESS: ${{ inputs.access }}
        INPUT_VERIFY_URL: ${{ inputs.verify-url }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail

        INSTALL_DIR="${ROBOTX_INSTALL_DIR}"

        ROBOTX_BIN="${INSTALL_DIR}/robotx"
        if [[ ! -x "${ROBOTX_BIN}" ]]; then
          echo "robotx binary not found at ${ROBOTX_BIN}" >&2
          exit 1
        fi

        EFFECTIVE_BASE_URL="${INPUT_BASE_URL}"
        if [[ -z "${EFFECTIVE_BASE_URL}" ]]; then
          EFFECTIVE_BASE_URL="${INPUT_BASE_URL_ALT}"
        fi

        EFFECTIVE_API_KEY="${INPUT_API_KEY}"
        if [[ -z "${EFFECTIVE_API_KEY}" ]]; then
          EFFECTIVE_API_KEY="${INPUT_API_KEY_ALT}"
        fi

        if [[ -z "${EFFECTIVE_BASE_URL}" ]]; then
          echo "::error::missing input: base-url (or base_url)" >&2
          exit 1
        fi

        if [[ -z "${EFFECTIVE_API_KEY}" ]]; then
          echo "::error::missing input: api-key (or api_key)" >&2
          exit 1
        fi
        if [[ "${INPUT_LOCAL_BUILD}" != "true" ]]; then
          echo "::error::RobotX no longer supports remote build; local-build must remain true" >&2
          exit 1
        fi

        EFFECTIVE_VERSION_LABEL="${INPUT_VERSION_LABEL}"
        if [[ -z "${EFFECTIVE_VERSION_LABEL}" ]]; then
          EFFECTIVE_VERSION_LABEL="${INPUT_VERSION_LABEL_ALT}"
        fi

        EFFECTIVE_SOURCE_REF="${INPUT_SOURCE_REF}"
        if [[ -z "${EFFECTIVE_SOURCE_REF}" ]]; then
          EFFECTIVE_SOURCE_REF="${INPUT_SOURCE_REF_ALT}"
        fi
        if [[ -z "${EFFECTIVE_SOURCE_REF}" ]]; then
          REF_PART=""
          if [[ -n "${GITHUB_REF_NAME:-}" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              REF_PART="tag:${GITHUB_REF_NAME}"
            elif [[ "${GITHUB_REF_TYPE:-}" == "branch" ]]; then
              REF_PART="branch:${GITHUB_REF_NAME}"
            fi
          fi
          SHA_PART="${GITHUB_SHA:-}"
          if [[ -n "${REF_PART}" && -n "${SHA_PART}" ]]; then
            EFFECTIVE_SOURCE_REF="${REF_PART}@${SHA_PART}"
          elif [[ -n "${REF_PART}" ]]; then
            EFFECTIVE_SOURCE_REF="${REF_PART}"
          elif [[ -n "${SHA_PART}" ]]; then
            EFFECTIVE_SOURCE_REF="${SHA_PART}"
          fi
        fi

        cmd=("${ROBOTX_BIN}" deploy "${INPUT_PROJECT_PATH}" --output json --base-url "${EFFECTIVE_BASE_URL}" --api-key "${EFFECTIVE_API_KEY}" --publish="${INPUT_PUBLISH}" --local-build="${INPUT_LOCAL_BUILD}" --wait="${INPUT_WAIT}" --timeout "${INPUT_TIMEOUT}" --access "${INPUT_ACCESS}")

        if [[ -n "${INPUT_PROJECT_NAME}" ]]; then
          cmd+=(--name "${INPUT_PROJECT_NAME}")
        fi
        if [[ -n "${EFFECTIVE_VERSION_LABEL}" ]]; then
          cmd+=(--version-label "${EFFECTIVE_VERSION_LABEL}")
        fi
        if [[ -n "${EFFECTIVE_SOURCE_REF}" ]]; then
          cmd+=(--source-ref "${EFFECTIVE_SOURCE_REF}")
        fi
        if [[ "${INPUT_VERIFY_URL}" == "true" ]]; then
          cmd+=(--verify-url)
        fi

        if [[ -n "${INPUT_EXTRA_ARGS}" ]]; then
          eval "set -- ${INPUT_EXTRA_ARGS}"
          cmd+=("$@")
        fi

        ROBOTX_JSON="$("${cmd[@]}")"

        export ROBOTX_JSON
        python3 - <<'PY'
        import json
        import os
        import uuid

        raw = os.environ.get("ROBOTX_JSON", "").strip()
        payload = json.loads(raw) if raw else {}
        data = payload.get("data") or {}
        project = data.get("project") if isinstance(data.get("project"), dict) else {}
        build = data.get("build") if isinstance(data.get("build"), dict) else {}
        urls = data.get("urls") if isinstance(data.get("urls"), dict) else {}

        def first_non_empty(*values):
            for value in values:
                if isinstance(value, str) and value:
                    return value
            return ""

        project_id = first_non_empty(data.get("project_id"), project.get("project_id"), build.get("project_id"))
        build_id = first_non_empty(data.get("build_id"), build.get("build_id"))
        preview_url = first_non_empty(data.get("preview_url"), urls.get("preview_url"))
        production_url = first_non_empty(data.get("production_url"), urls.get("production_url"))
        status = first_non_empty(data.get("build_status"), build.get("status"))
        version_label = first_non_empty(data.get("version_label"), build.get("version_label"))
        source_ref = first_non_empty(data.get("source_ref"), build.get("source_ref"))
        version_seq_raw = data.get("version_seq")
        if version_seq_raw in (None, ""):
            version_seq_raw = build.get("version_seq")
        version_seq = "" if version_seq_raw in (None, "") else str(version_seq_raw)

        output_path = os.environ["GITHUB_OUTPUT"]
        delimiter = f"ROBOTX_JSON_{uuid.uuid4().hex}"

        with open(output_path, "a", encoding="utf-8") as f:
            f.write(f"project_id={project_id}\n")
            f.write(f"build_id={build_id}\n")
            f.write(f"preview_url={preview_url}\n")
            f.write(f"production_url={production_url}\n")
            f.write(f"status={status}\n")
            f.write(f"version_label={version_label}\n")
            f.write(f"version_seq={version_seq}\n")
            f.write(f"source_ref={source_ref}\n")
            f.write(f"raw_json<<{delimiter}\n")
            f.write(raw)
            if raw and not raw.endswith("\n"):
                f.write("\n")
            f.write(f"{delimiter}\n")
        PY
